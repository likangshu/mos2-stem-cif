<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoS2 晶界交互编辑器 - V14 稳定版</title>
    <!-- 引入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 原生库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #020617; color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .tool-active { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.2) !important; color: #60a5fa !important; }
        input[type="range"] { accent-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 稳定版图标渲染组件 (解决 React Error #130)
        const Icon = ({ name, size = 18, className = "" }) => {
            const containerRef = React.useRef(null);
            React.useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const iconElt = document.createElement('i');
                    iconElt.setAttribute('data-lucide', name);
                    iconElt.style.width = `${size}px`;
                    iconElt.style.height = `${size}px`;
                    if (className) iconElt.className = className;
                    containerRef.current.appendChild(iconElt);
                    window.lucide.createIcons({ attrs: { strokeWidth: 2, width: size, height: size } });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center" />;
        };

        const SCALE_DEFAULT = 0.10079;
        const ATOM_COLORS = { 
            Mo: '#fbbf24', S2: '#60a5fa', S1: '#f87171', 
            GBMask: 'rgba(239, 68, 68, 0.3)', DomainBoundary: 'rgba(59, 130, 246, 0.2)', Ghost: 'rgba(255, 255, 255, 0.5)' 
        };

        const App = () => {
            const [image, setImage] = React.useState(null);
            const [manualAtoms, setManualAtoms] = React.useState(() => JSON.parse(localStorage.getItem('mos2_manual_v14')) || []);
            const [gbMasks, setGbMasks] = React.useState(() => JSON.parse(localStorage.getItem('mos2_masks_v14')) || []);
            const [domains, setDomains] = React.useState(() => JSON.parse(localStorage.getItem('mos2_domains_v14')) || []);
            const [currentSeeds, setCurrentSeeds] = React.useState(() => JSON.parse(localStorage.getItem('mos2_seeds_v14')) || []);
            
            const [viewMode, setViewMode] = React.useState('edit');
            const [selectedType, setSelectedType] = React.useState('Mo');
            const [currentPolygon, setCurrentPolygon] = React.useState(null);
            const [ghostDomain, setGhostDomain] = React.useState(null);
            const [editingDomain, setEditingDomain] = React.useState(null);
            const [history, setHistory] = React.useState([]);
            const [message, setMessage] = React.useState(null);
            
            const [isDragging, setIsDragging] = React.useState(false);
            const [selectionStart, setSelectionStart] = React.useState(null);
            const [selectionEnd, setSelectionEnd] = React.useState(null);
            const canvasRef = React.useRef(null);

            React.useEffect(() => {
                localStorage.setItem('mos2_manual_v14', JSON.stringify(manualAtoms));
                localStorage.setItem('mos2_masks_v14', JSON.stringify(gbMasks));
                localStorage.setItem('mos2_domains_v14', JSON.stringify(domains));
                localStorage.setItem('mos2_seeds_v14', JSON.stringify(currentSeeds));
            }, [manualAtoms, gbMasks, domains, currentSeeds]);

            const showMsg = (txt) => { setMessage(txt); setTimeout(() => setMessage(null), 3000); };
            const restoreProgress = () => {
                const saved = localStorage.getItem('mos2_manual_v14');
                if (saved) {
                    setManualAtoms(JSON.parse(localStorage.getItem('mos2_manual_v14')) || []);
                    setGbMasks(JSON.parse(localStorage.getItem('mos2_masks_v14')) || []);
                    setDomains(JSON.parse(localStorage.getItem('mos2_domains_v14')) || []);
                    setCurrentSeeds(JSON.parse(localStorage.getItem('mos2_seeds_v14')) || []);
                    showMsg("数据已恢复");
                }
            };

            const pushHistory = React.useCallback(() => {
                const state = { manualAtoms, gbMasks, domains, currentSeeds };
                setHistory(prev => [JSON.stringify(state), ...prev].slice(0, 30));
            }, [manualAtoms, gbMasks, domains, currentSeeds]);

            const undo = () => {
                if (history.length === 0) return;
                const last = JSON.parse(history[0]);
                setManualAtoms(last.manualAtoms || []); setGbMasks(last.gbMasks || []); setDomains(last.domains || []); setCurrentSeeds(last.currentSeeds || []);
                setHistory(prev => prev.slice(1));
            };

            const isPointInPolygon = (x, y, polygon) => {
                if (!polygon || polygon.length < 3) return false;
                let inside = false;
                for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                    const xi = polygon[i].x, yi = polygon[i].y, xj = polygon[j].x, yj = polygon[j].y;
                    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
                }
                return inside;
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => { const img = new Image(); img.onload = () => setImage(img); img.src = event.target.result; };
                    reader.readAsDataURL(file);
                }
            };

            const performExtrapolation = () => {
                if (currentSeeds.length < 3 || !currentPolygon) return;
                const mos = currentSeeds.filter(s => s.type === 'Mo'), s2s = currentSeeds.filter(s => s.type === 'S2');
                const o = mos[0];
                const v1 = { x: (mos[1]?.x || o.x + 30) - o.x, y: (mos[1]?.y || o.y) - o.y };
                const v2 = { x: (mos[2]?.x || o.x) - o.x, y: (mos[2]?.y || o.y + 30) - o.y };
                const basis = s2s.map(s => ({ x: s.x - o.x, y: s.y - o.y }));
                if (basis.length === 0) basis.push({ x: (v1.x + v2.x) / 3, y: (v1.y + v2.y) / 3 });
                const genAtoms = [];
                for (let i = -120; i < 120; i++) {
                    for (let j = -120; j < 120; j++) {
                        const mx = i * v1.x + j * v2.x, my = i * v1.y + j * v2.y;
                        genAtoms.push({ x: mx, y: my, type: 'Mo', id: `m-${Date.now()}-${i}-${j}` });
                        basis.forEach((b, idx) => genAtoms.push({ x: mx + b.x, y: my + b.y, type: 'S2', id: `s-${Date.now()}-${i}-${j}-${idx}` }));
                    }
                }
                setGhostDomain({ atoms: genAtoms, boundary: currentPolygon.points, transform: { x: o.x, y: o.y, scale: 1.0, rot: 0.0 }, name: `晶粒 ${domains.length + 1}` });
                setViewMode('transform_ghost');
            };

            const enterDomainEdit = (domain) => {
                const cx = domain.atoms.reduce((sum, a) => sum + a.x, 0) / domain.atoms.length, cy = domain.atoms.reduce((sum, a) => sum + a.y, 0) / domain.atoms.length;
                setEditingDomain({ ...domain, originalAtoms: domain.atoms.map(a => ({ ...a, x: a.x - cx, y: a.y - cy })), transform: { x: cx, y: cy, scale: 1.0, rot: 0.0 } });
                setViewMode('transform_domain');
            };

            const adjustTransform = (target, key, delta) => {
                const setter = target === 'ghost' ? setGhostDomain : setEditingDomain;
                setter(prev => prev ? ({ ...prev, transform: { ...prev.transform, [key]: prev.transform[key] + delta } }) : null);
            };

            const finalizeTransform = (target) => {
                pushHistory();
                const data = target === 'ghost' ? ghostDomain : editingDomain;
                const { x, y, scale, rot } = data.transform, rad = (rot * Math.PI) / 180, sourceAtoms = target === 'ghost' ? data.atoms : data.originalAtoms;
                const finalizedAtoms = sourceAtoms.map(a => {
                    const rx = a.x * Math.cos(rad) - a.y * Math.sin(rad), ry = a.x * Math.sin(rad) + a.y * Math.cos(rad);
                    return { ...a, x: rx * scale + x, y: ry * scale + y };
                }).filter(a => isPointInPolygon(a.x, a.y, data.boundary) && !gbMasks.some(m => isPointInPolygon(a.x, a.y, m.points)));

                if (target === 'ghost') {
                    setDomains([...domains, { id: Date.now(), name: data.name, atoms: finalizedAtoms, boundary: data.boundary }]);
                    setGhostDomain(null); setCurrentPolygon(null); setCurrentSeeds([]);
                } else {
                    setDomains(prev => prev.map(d => d.id === editingDomain.id ? { ...d, atoms: finalizedAtoms } : d));
                    setEditingDomain(null);
                }
                setViewMode('edit'); showMsg("晶粒已合并");
            };

            const handleMouseDown = (e) => {
                if (viewMode === 'delete_area') {
                    const rect = canvasRef.current.getBoundingClientRect();
                    setIsDragging(true); const x = e.clientX - rect.left, y = e.clientY - rect.top;
                    setSelectionStart({ x, y }); setSelectionEnd({ x, y });
                }
            };

            const handleMouseMove = (e) => { if (isDragging && viewMode === 'delete_area') { const rect = canvasRef.current.getBoundingClientRect(); setSelectionEnd({ x: e.clientX - rect.left, y: e.clientY - rect.top }); } };

            const handleMouseUp = () => {
                if (isDragging && viewMode === 'delete_area' && selectionStart && selectionEnd) {
                    pushHistory();
                    const x1 = Math.min(selectionStart.x, selectionEnd.x), y1 = Math.min(selectionStart.y, selectionEnd.y), x2 = Math.max(selectionStart.x, selectionEnd.x), y2 = Math.max(selectionStart.y, selectionEnd.y);
                    const inBox = (p) => (p.x >= x1 && p.x <= x2 && p.y >= y1 && p.y <= y2);
                    setManualAtoms(prev => prev.filter(a => !inBox(a))); setCurrentSeeds(prev => prev.filter(s => !inBox(s))); setDomains(prev => prev.map(d => ({ ...d, atoms: d.atoms.filter(a => !inBox(a)) })));
                    setIsDragging(false); setSelectionStart(null); setSelectionEnd(null);
                }
            };

            const handleCanvasClick = (e) => {
                if (viewMode.startsWith('transform') || viewMode === 'delete_area') return;
                const rect = canvasRef.current.getBoundingClientRect(); const x = e.clientX - rect.left, y = e.clientY - rect.top;
                if (viewMode === 'gb_mask' || viewMode === 'domain_boundary') {
                    if (!currentPolygon) setCurrentPolygon({ points: [{ x, y }] });
                    else {
                        const dist = Math.sqrt((x - currentPolygon.points[0].x)**2 + (y - currentPolygon.points[0].y)**2);
                        if (dist < 15 && currentPolygon.points.length >= 3) {
                            pushHistory();
                            if (viewMode === 'gb_mask') { setGbMasks([...gbMasks, { id: Date.now(), points: currentPolygon.points }]); setCurrentPolygon(null); }
                            else setViewMode('seed');
                        } else setCurrentPolygon({ ...currentPolygon, points: [...currentPolygon.points, { x, y }] });
                    }
                } else if (viewMode === 'seed') { if (currentSeeds.length < 6) setCurrentSeeds([...currentSeeds, { x, y, type: selectedType, id: Date.now() }]); }
                else if (viewMode === 'edit') { pushHistory(); setManualAtoms([...manualAtoms, { x, y, type: selectedType, id: Date.now() }]); }
                else if (viewMode === 'delete') {
                    pushHistory(); const distSq = (p) => (p.x - x)**2 + (p.y - y)**2;
                    setManualAtoms(prev => prev.filter(a => distSq(a) > 100)); setCurrentSeeds(prev => prev.filter(s => distSq(s) > 100)); setDomains(prev => prev.map(d => ({ ...d, atoms: d.atoms.filter(a => distSq(a) > 64) })));
                }
            };

            React.useEffect(() => {
                if (!image || !canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, image.width, image.height); ctx.drawImage(image, 0, 0);
                gbMasks.forEach(mask => { ctx.beginPath(); ctx.moveTo(mask.points[0].x, mask.points[0].y); mask.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath(); ctx.fillStyle = ATOM_COLORS.GBMask; ctx.fill(); });
                domains.forEach(d => {
                    if (editingDomain && editingDomain.id === d.id) return;
                    d.atoms.forEach(a => { ctx.beginPath(); ctx.arc(a.x, a.y, 4, 0, Math.PI * 2); ctx.fillStyle = ATOM_COLORS[a.type] + 'aa'; ctx.fill(); });
                    ctx.beginPath(); ctx.moveTo(d.boundary[0].x, d.boundary[0].y); d.boundary.forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath(); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.stroke();
                });
                const drawPreview = (data) => {
                    const { x, y, scale, rot } = data.transform, rad = (rot * Math.PI) / 180, source = data.atoms || data.originalAtoms;
                    ctx.save(); ctx.translate(x, y); ctx.rotate(rad);
                    source.forEach(a => {
                        const rx = (a.x * Math.cos(rad) - a.y * Math.sin(rad)) * scale + x, ry = (a.x * Math.sin(rad) + a.y * Math.cos(rad)) * scale + y;
                        ctx.beginPath(); ctx.arc(a.x * scale, a.y * scale, 4, 0, Math.PI * 2); ctx.fillStyle = isPointInPolygon(rx, ry, data.boundary) ? ATOM_COLORS[a.type] : 'rgba(255,255,255,0.05)'; ctx.fill();
                    });
                    ctx.restore();
                };
                if (ghostDomain) drawPreview(ghostDomain); if (editingDomain) drawPreview(editingDomain);
                manualAtoms.forEach(a => { ctx.beginPath(); ctx.arc(a.x, a.y, 6, 0, Math.PI * 2); ctx.fillStyle = ATOM_COLORS[a.type]; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke(); });
                if (currentPolygon) { ctx.beginPath(); ctx.moveTo(currentPolygon.points[0].x, currentPolygon.points[0].y); currentPolygon.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.strokeStyle = '#fff'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]); }
                currentSeeds.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, Math.PI * 2); ctx.fillStyle = ATOM_COLORS[s.type]; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); });
                if (isDragging && selectionStart && selectionEnd) {
                    ctx.strokeStyle = '#ef4444'; ctx.setLineDash([2, 2]); ctx.strokeRect(selectionStart.x, selectionStart.y, selectionEnd.x - selectionStart.x, selectionEnd.y - selectionStart.y);
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.1)'; ctx.fillRect(selectionStart.x, selectionStart.y, selectionEnd.x - selectionStart.x, selectionEnd.y - selectionStart.y); ctx.setLineDash([]);
                }
            }, [image, manualAtoms, gbMasks, domains, ghostDomain, editingDomain, currentPolygon, currentSeeds, selectionStart, selectionEnd, isDragging]);

            const exportCIF = () => {
                const all = [...manualAtoms]; domains.forEach(d => all.push(...d.atoms)); if (all.length === 0) return;
                const boxX = Math.max(...all.map(a => a.x * SCALE_DEFAULT)) + 10, boxY = Math.max(...all.map(a => a.y * SCALE_DEFAULT)) + 10;
                let cif = `data_MoS2\n_cell_length_a ${boxX.toFixed(4)}\n_cell_length_b ${boxY.toFixed(4)}\n_cell_length_c 20.0\nloop_\n_atom_site_label\n_atom_site_type_symbol\n_atom_site_fract_x\n_atom_site_fract_y\n_atom_site_fract_z\n`;
                all.forEach((a, i) => {
                    const fx = (a.x * SCALE_DEFAULT) / boxX, fy = (a.y * SCALE_DEFAULT) / boxY;
                    if (a.type === 'Mo') cif += `Mo${i} Mo ${fx.toFixed(6)} ${fy.toFixed(6)} 0.500000\n`;
                    else if (a.type === 'S2') { cif += `S${i}a S ${fx.toFixed(6)} ${fy.toFixed(6)} ${(10+1.56)/20}\nS${i}b S ${fx.toFixed(6)} ${fy.toFixed(6)} ${(10-1.56)/20}\n`; }
                    else cif += `S${i} S ${fx.toFixed(6)} ${fy.toFixed(6)} ${(10+1.56)/20}\n`;
                });
                const b = new Blob([cif], { type: 'text/plain' }); const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = 'refined_mos2.cif'; l.click(); showMsg("CIF 已导出");
            };

            const exportImage = () => { if (!canvasRef.current) return; const l = document.createElement('a'); l.download = 'labeled_structure.png'; l.href = canvasRef.current.toDataURL("image/png"); l.click(); showMsg("PNG 已保存"); };

            return (
                <div className="flex flex-col h-screen bg-[#020617] text-slate-100 font-sans select-none overflow-hidden">
                    <div className="flex items-center justify-between px-6 py-3 bg-[#0f172a] border-b border-slate-800 shadow-2xl z-30">
                        <div className="flex items-center gap-6">
                            <h1 className="text-xl font-black tracking-tighter flex items-center gap-2 text-blue-400 italic"><Icon name="layers" size={22} className="text-blue-500" /> MoS2 PRECISION V14</h1>
                            <div className="flex gap-2">
                                <button onClick={undo} className="p-2 bg-slate-800/50 hover:bg-slate-700 rounded transition border border-slate-700"><Icon name="undo-2" /></button>
                                <button onClick={restoreProgress} className="p-2 bg-blue-900/30 hover:bg-blue-800 rounded transition border border-blue-800 text-blue-300 flex items-center gap-2 px-3 text-xs font-bold"><Icon name="history" size={16}/> 恢复标注</button>
                                <button onClick={() => {if(confirm('重置所有工作？')) {localStorage.clear(); window.location.reload();}}} className="p-2 hover:bg-red-900/40 rounded text-red-400"><Icon name="rotate-ccw" /></button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <label className="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg cursor-pointer text-xs font-bold border border-slate-700 transition flex items-center gap-2">
                                <Icon name="upload" size={14}/> 载入 STEM<input type="file" className="hidden" onChange={handleImageUpload} />
                            </label>
                            <div className="h-8 w-px bg-slate-800 mx-1" />
                            <button onClick={exportCIF} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 shadow-lg transition"><Icon name="file-down" size={14}/> CIF</button>
                            <button onClick={exportImage} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 shadow-lg transition"><Icon name="image" size={14}/> PNG</button>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden relative">
                        {message && <div className="absolute top-4 left-1/2 -translate-x-1/2 z-50 bg-blue-600 text-white px-6 py-2 rounded-full shadow-2xl font-bold text-sm animate-bounce">{message}</div>}

                        <div className="w-80 bg-[#0f172a] border-r border-slate-800 flex flex-col p-5 gap-6 overflow-y-auto scrollbar-hide">
                            <section>
                                <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 text-center border-b border-slate-800 pb-2">1. 区域分域补全</h2>
                                <div className="space-y-2">
                                    <button onClick={() => {setViewMode('gb_mask'); setCurrentPolygon(null);}} className={`w-full flex items-center gap-3 p-3 rounded-xl border-2 transition text-xs font-bold ${viewMode === 'gb_mask' ? 'tool-active' : 'border-slate-800 bg-slate-900/40'}`}>
                                        <Icon name="pen-tool" size={16} /> 划定晶界禁区
                                    </button>
                                    <button onClick={() => {setViewMode('domain_boundary'); setCurrentPolygon(null);}} className={`w-full flex items-center gap-3 p-3 rounded-xl border-2 transition text-xs font-bold ${viewMode === 'domain_boundary' ? 'tool-active' : 'border-slate-800 bg-slate-900/40'}`}>
                                        <Icon name="grid-3x3" size={16} /> 划定晶粒本征区
                                    </button>
                                </div>
                            </section>

                            {(viewMode === 'transform_ghost' || viewMode === 'transform_domain') && (
                                <section className="bg-blue-900/20 p-4 rounded-2xl border border-blue-500/40 animate-in fade-in">
                                    <h2 className="text-xs font-black text-blue-400 uppercase mb-4 flex items-center gap-2"><Icon name="sliders" size={14}/> {viewMode === 'transform_ghost' ? "预览微调" : "区域精修"}</h2>
                                    <div className="grid grid-cols-3 gap-1 mb-4">
                                        <div/><button onClick={() => adjustTransform(viewMode === 'transform_ghost'?'ghost':'domain', 'y', -0.1)} className="p-2 bg-slate-800 rounded hover:bg-slate-700 flex justify-center text-blue-400"><Icon name="chevron-up" size={14}/></button><div/>
                                        <button onClick={() => adjustTransform(viewMode === 'transform_ghost'?'ghost':'domain', 'x', -0.1)} className="p-2 bg-slate-800 rounded hover:bg-slate-700 flex justify-center text-blue-400"><Icon name="chevron-left" size={14}/></button>
                                        <div className="flex items-center justify-center text-[9px] font-mono text-slate-400 italic">0.1px</div>
                                        <button onClick={() => adjustTransform(viewMode === 'transform_ghost'?'ghost':'domain', 'x', 0.1)} className="p-2 bg-slate-800 rounded hover:bg-slate-700 flex justify-center text-blue-400"><Icon name="chevron-right" size={14}/></button>
                                        <div/><button onClick={() => adjustTransform(viewMode === 'transform_ghost'?'ghost':'domain', 'y', 0.1)} className="p-2 bg-slate-800 rounded hover:bg-slate-700 flex justify-center text-blue-400"><Icon name="chevron-down" size={14}/></button><div/>
                                    </div>
                                    <div className="space-y-4">
                                        <div><div className="flex justify-between text-[9px] mb-1 text-slate-400"><span>旋转: {(viewMode==='transform_ghost'?ghostDomain:editingDomain).transform.rot.toFixed(1)}°</span></div><input type="range" min="-15" max="15" step="0.1" value={(viewMode==='transform_ghost'?ghostDomain:editingDomain).transform.rot} onChange={(e)=>adjustTransform(viewMode==='transform_ghost'?'ghost':'domain', 'rot', parseFloat(e.target.value)-(viewMode==='transform_ghost'?ghostDomain:editingDomain).transform.rot)} className="w-full h-1" /></div>
                                        <div><div className="flex justify-between text-[9px] mb-1 text-slate-400"><span>比例: x{(viewMode==='transform_ghost'?ghostDomain:editingDomain).transform.scale.toFixed(3)}</span></div><input type="range" min="0.9" max="1.1" step="0.001" value={(viewMode==='transform_ghost'?ghostDomain:editingDomain).transform.scale} onChange={(e)=>adjustTransform(viewMode==='transform_ghost'?'ghost':'domain', 'scale', parseFloat(e.target.value)-(viewMode==='transform_ghost'?ghostDomain:editingDomain).transform.scale)} className="w-full h-1" /></div>
                                        <div className="flex flex-col gap-2"><button onClick={() => finalizeTransform(viewMode==='transform_ghost'?'ghost':'domain')} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-black text-xs transition flex items-center justify-center gap-2"><Icon name="check-circle-2" size={16}/> 确认并合并</button><button onClick={() => {setGhostDomain(null); setEditingDomain(null); setViewMode('edit');}} className="w-full py-2 bg-red-900/20 text-red-400 rounded-xl text-[10px] font-bold text-center">放弃修改</button></div>
                                    </div>
                                </section>
                            )}

                            <section>
                                <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 text-center border-b border-slate-800 pb-2">2. 晶粒管理</h2>
                                <div className="space-y-2 max-h-48 overflow-y-auto pr-1 scrollbar-hide">
                                    {domains.length === 0 && <p className="text-[9px] text-slate-600 italic text-center py-2 border border-dashed border-slate-800 rounded">暂无晶粒</p>}
                                    {domains.map(d => (
                                        <div key={d.id} className="flex items-center justify-between p-2 rounded bg-slate-900/50 border border-slate-800 hover:border-blue-500/50 transition"><span className="text-[10px] font-bold text-slate-400 truncate w-32">{d.name}</span><div className="flex gap-1"><button onClick={() => enterDomainEdit(d)} className="p-1 text-slate-500 hover:text-blue-400"><Icon name="sliders" size={14}/></button><button onClick={() => {pushHistory(); setDomains(prev => prev.filter(x => x.id !== d.id));}} className="p-1 text-slate-500 hover:text-red-400"><Icon name="trash-2" size={14}/></button></div></div>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 text-center border-b border-slate-800 pb-2">3. 全能橡皮擦</h2>
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <button onClick={() => setViewMode('edit')} className={`p-3 rounded-xl border-2 transition ${viewMode === 'edit' ? 'tool-active' : 'border-slate-800'}`}><Icon name="plus" size={18} /><span className="text-[9px] block mt-1">手动添加</span></button>
                                    <button onClick={() => setViewMode('delete')} className={`p-3 rounded-xl border-2 transition ${viewMode === 'delete' ? 'tool-active' : 'border-slate-800'}`}><Icon name="mouse-pointer-2" size={18} /><span className="text-[9px] block mt-1">点消除</span></button>
                                    <button onClick={() => setViewMode('delete_area')} className={`p-3 col-span-2 rounded-xl border-2 transition ${viewMode === 'delete_area' ? 'tool-active' : 'border-slate-800'}`}><Icon name="square" size={18} className="mx-auto" /><span className="text-[9px] block mt-1 font-bold">区域消除</span></button>
                                </div>
                                <div className="flex gap-1 bg-black/40 p-1.5 rounded-lg border border-slate-800">
                                    {['Mo', 'S2', 'S1'].map(t => ( <button key={t} onClick={() => setSelectedType(t)} className={`flex-1 py-1 rounded text-[10px] font-bold transition ${selectedType === t ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>{t}</button> ))}
                                </div>
                            </section>
                        </div>

                        <div className="flex-1 bg-black overflow-hidden relative flex flex-col">
                            <div className="absolute top-6 left-6 z-20 space-y-3 pointer-events-none">
                                {viewMode === 'seed' && (
                                    <div className="bg-yellow-500 text-slate-900 px-4 py-2 rounded-xl text-[11px] font-black shadow-2xl flex items-center gap-4 pointer-events-auto">
                                        <div className="flex items-center gap-2"><Icon name="grid-3x3" size={14} /> 正在标注 H 相种子: <span className="underline">{currentSeeds.length}/6</span></div>
                                        <button onClick={performExtrapolation} disabled={currentSeeds.length < 3} className="bg-black text-white px-3 py-1 rounded-lg text-[10px] hover:bg-slate-800 disabled:opacity-50 transition font-bold">执行外推</button>
                                        {currentSeeds.length > 0 && <button onClick={() => setCurrentSeeds(prev => prev.slice(0,-1))} className="bg-slate-900 text-white p-1 rounded hover:bg-black transition"><Icon name="corner-up-left" size={12}/></button>}
                                    </div>
                                )}
                                {viewMode === 'delete_area' && <div className="bg-red-600 text-white px-4 py-2 rounded-xl text-[11px] font-bold shadow-2xl flex items-center gap-2 animate-pulse pointer-events-auto"><Icon name="square" size={14} /> 区域消除：拖拽框选原子</div>}
                            </div>
                            <div className="flex-1 overflow-auto flex items-start justify-center p-20 scrollbar-hide">
                                {image ? (
                                    <div className="relative shadow-[0_0_100px_rgba(0,0,0,0.8)] border border-slate-800">
                                        <canvas ref={canvasRef} width={image.width} height={image.height} onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onClick={handleCanvasClick} className="block bg-slate-950 cursor-crosshair rounded" />
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-700 opacity-20">
                                        <Icon name="refresh-cw" size={80} className="animate-spin" />
                                        <p className="text-xl font-light tracking-[0.5em] italic uppercase mt-4">Awaiting STEM Data</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
