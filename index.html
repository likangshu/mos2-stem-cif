<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoS2 晶界交互编辑器 V32 - 终极控制版</title>
    <!-- 引入核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #020617; color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; display: block; background-color: #000; transition: cursor 0.2s; }
        
        .main-viewport { 
            flex: 1; 
            background-color: #000; 
            overflow: auto; 
            position: relative;
            display: block;
        }

        .main-viewport::-webkit-scrollbar { width: 14px; height: 14px; }
        .main-viewport::-webkit-scrollbar-track { background: #0f172a; }
        .main-viewport::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 7px; border: 3px solid #0f172a; }
        .main-viewport::-webkit-scrollbar-thumb:hover { background: #60a5fa; }

        .canvas-wrapper { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            min-width: 100%;
            padding: 400px;
        }
        
        .sidebar-scroll::-webkit-scrollbar { display: none; }
        .sidebar-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tool-active { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.2) !important; color: #60a5fa !important; }
        input[type="range"] { accent-color: #3b82f6; width: 100%; height: 4px; background: #1e293b; border-radius: 2px; appearance: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: #3b82f6; border-radius: 50%; }
        
        .zoom-overlay { position: absolute; bottom: 40px; right: 40px; z-index: 50; pointer-events: none; }
        .interaction-hint { position: absolute; top: 120px; right: 20px; z-index: 40; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 物理核心算法：点在多边形内判定 ---
        const isPointInPolygon = (x, y, polygon) => {
            if (!polygon || polygon.length < 3) return false;
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y, xj = polygon[j].x, yj = polygon[j].y;
                if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
            }
            return inside;
        };

        // 稳定版图标渲染组件
        const Icon = ({ name, size = 18, className = "" }) => {
            const containerRef = React.useRef(null);
            React.useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const iconElt = document.createElement('i');
                    iconElt.setAttribute('data-lucide', name);
                    if (className) iconElt.className = className;
                    containerRef.current.appendChild(iconElt);
                    window.lucide.createIcons({ attrs: { strokeWidth: 2, width: size, height: size } });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center leading-none" />;
        };

        const SCALE_DEFAULT = 0.10079; // A/Pixel
        const ATOM_COLORS = { 
            Mo: '#fbbf24', S2: '#60a5fa', S1: '#f87171', 
            GBMask: 'rgba(239, 68, 68, 0.3)', DomainBoundary: 'rgba(59, 130, 246, 0.2)', Ghost: 'rgba(255, 255, 255, 0.5)' 
        };

        const App = () => {
            const [image, setImage] = React.useState(null);
            const [zoomLevel, setZoomLevel] = React.useState(1.0);
            
            // 数据持久化 V32
            const [manualAtoms, setManualAtoms] = React.useState(() => JSON.parse(localStorage.getItem('mos2_manual_v32')) || []);
            const [gbMasks, setGbMasks] = React.useState(() => JSON.parse(localStorage.getItem('mos2_masks_v32')) || []);
            const [domains, setDomains] = React.useState(() => JSON.parse(localStorage.getItem('mos2_domains_v32')) || []);
            const [currentSeeds, setCurrentSeeds] = React.useState(() => JSON.parse(localStorage.getItem('mos2_seeds_v32')) || []);
            
            const [viewMode, setViewMode] = React.useState('edit');
            const [selectedType, setSelectedType] = React.useState('Mo');
            const [currentPolygon, setCurrentPolygon] = React.useState(null);
            const [ghostDomain, setGhostDomain] = React.useState(null);
            const [editingDomain, setEditingDomain] = React.useState(null);
            const [history, setHistory] = React.useState([]);
            const [message, setMessage] = React.useState(null);
            
            const [isDragging, setIsDragging] = React.useState(false);
            const [dragStart, setDragStart] = React.useState(null);
            const [selectionStart, setSelectionStart] = React.useState(null);
            const [selectionEnd, setSelectionEnd] = React.useState(null);
            
            const canvasRef = React.useRef(null);

            // --- 状态自动清理：切换工具即瞬间抹除 Ghost 层 ---
            React.useEffect(() => {
                if (viewMode !== 'transform_ghost' && viewMode !== 'transform_domain') {
                    setGhostDomain(null); setEditingDomain(null);
                }
                if (viewMode !== 'gb_mask' && viewMode !== 'domain_boundary' && viewMode !== 'seed' && !viewMode.startsWith('transform')) {
                    setCurrentPolygon(null);
                }
            }, [viewMode]);

            React.useEffect(() => {
                localStorage.setItem('mos2_manual_v32', JSON.stringify(manualAtoms));
                localStorage.setItem('mos2_masks_v32', JSON.stringify(gbMasks));
                localStorage.setItem('mos2_domains_v32', JSON.stringify(domains));
                localStorage.setItem('mos2_seeds_v32', JSON.stringify(currentSeeds));
            }, [manualAtoms, gbMasks, domains, currentSeeds]);

            const showMsg = (txt) => { setMessage(txt); setTimeout(() => setMessage(null), 3000); };
            
            const restoreProgress = () => {
                const sM = localStorage.getItem('mos2_manual_v32');
                if (sM) {
                    setManualAtoms(JSON.parse(sM) || []);
                    setGbMasks(JSON.parse(localStorage.getItem('mos2_masks_v32')) || []);
                    setDomains(JSON.parse(localStorage.getItem('mos2_domains_v32')) || []);
                    setCurrentSeeds(JSON.parse(localStorage.getItem('mos2_seeds_v32')) || []);
                    showMsg("历史数据 V32 已恢复");
                }
            };

            const pushHistory = React.useCallback(() => {
                const state = { manualAtoms, gbMasks, domains, currentSeeds };
                setHistory(prev => [JSON.stringify(state), ...prev].slice(0, 30));
            }, [manualAtoms, gbMasks, domains, currentSeeds]);

            const undo = () => {
                if (history.length === 0) return;
                const last = JSON.parse(history[0]);
                setManualAtoms(last.manualAtoms || []); setGbMasks(last.gbMasks || []); setDomains(last.domains || []); setCurrentSeeds(last.currentSeeds || []);
                setHistory(prev => prev.slice(1));
            };

            const getRealCoords = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                return { x: (e.clientX - rect.left) / zoomLevel, y: (e.clientY - rect.top) / zoomLevel };
            };

            // --- 滚轮逻辑：仅负责底图缩放，不响应预览层微调 ---
            const handleWheel = (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    setZoomLevel(prev => Math.min(Math.max(prev * (e.deltaY > 0 ? 0.9 : 1.1), 0.1), 10));
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => { 
                        const img = new Image(); img.onload = () => { setImage(img); setZoomLevel(1.0); }; 
                        img.src = event.target.result; 
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleCifImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const lines = event.target.result.split('\n');
                    let cell = { a: 1, b: 1, c: 20 }, rawAtoms = [], loopCols = [], inLoop = false;
                    lines.forEach(line => {
                        const l = line.trim();
                        if (l.includes('_cell_length_a')) cell.a = parseFloat(l.split(/\s+/).pop());
                        if (l.includes('_cell_length_b')) cell.b = parseFloat(l.split(/\s+/).pop());
                        if (l === 'loop_') { inLoop = true; loopCols = []; return; }
                        if (inLoop && l.startsWith('_atom_site_')) { loopCols.push(l); return; }
                        if (inLoop && l && !l.startsWith('_')) {
                            const parts = l.split(/\s+/);
                            const getIdx = (k) => loopCols.findIndex(c => c.includes(k));
                            const xIdx = getIdx('_fract_x'), yIdx = getIdx('_fract_y'), symIdx = getIdx('_type_symbol');
                            if (xIdx !== -1 && parts.length >= loopCols.length) {
                                rawAtoms.push({ fx: parseFloat(parts[xIdx]), fy: parseFloat(parts[yIdx]), sym: parts[symIdx] || 'S' });
                            }
                        }
                    });
                    const sites = new Map();
                    rawAtoms.forEach(a => {
                        const key = `${a.fx.toFixed(4)}|${a.fy.toFixed(4)}`;
                        if (!sites.has(key)) sites.set(key, { fx: a.fx, fy: a.fy, syms: [] });
                        sites.get(key).syms.push(a.sym);
                    });
                    const finalAtoms = [];
                    sites.forEach(site => {
                        const isMo = site.syms.some(s => s.startsWith('M'));
                        let type = isMo ? 'Mo' : (site.syms.length >= 2 ? 'S2' : 'S1');
                        finalAtoms.push({
                            x: (site.fx * cell.a) / SCALE_DEFAULT, y: (site.fy * cell.b) / SCALE_DEFAULT,
                            type: type, id: `im-${Date.now()}-${Math.random()}`
                        });
                    });
                    if (finalAtoms.length > 0) {
                        pushHistory();
                        setManualAtoms(prev => [...prev, ...finalAtoms.filter(a => !prev.some(p => Math.sqrt((p.x-a.x)**2+(p.y-a.y)**2) < 2))]);
                        showMsg(`已载入结构：成功还原特征颜色`);
                    }
                };
                reader.readAsText(file);
            };

            const performExtrapolation = () => {
                if (currentSeeds.length < 6 || !currentPolygon) { showMsg("请确保已连点 6 个种子并闭合了区域"); return; }
                const mos = currentSeeds.slice(0, 3), s_refs = currentSeeds.slice(3, 6), o = mos[0];
                const v1 = { x: mos[1].x - o.x, y: mos[1].y - o.y }, v2 = { x: mos[2].x - o.x, y: mos[2].y - o.y };
                const det = v1.x * v2.y - v1.y * v2.x;
                if (Math.abs(det) < 0.1) return;
                const sLocal = s_refs.map(s => {
                    const dx = s.x - o.x, dy = s.y - o.y, i = (dx * v2.y - dy * v2.x) / det, j = (v1.x * dy - v1.y * dx) / det;
                    return { x: dx - (Math.round(i) * v1.x + Math.round(j) * v2.x), y: dy - (Math.round(i) * v1.y + Math.round(j) * v2.y) };
                });
                const avgS = sLocal.reduce((acc, cur) => ({ x: acc.x + cur.x, y: acc.y + cur.y }), { x: 0, y: 0 });
                avgS.x /= 3; avgS.y /= 3;
                const genAtoms = [];
                for (let i = -150; i < 150; i++) {
                    for (let j = -150; j < 150; j++) {
                        const mx = i * v1.x + j * v2.x, my = i * v1.y + j * v2.y;
                        genAtoms.push({ x: mx, y: my, type: 'Mo', id: `m-${i}-${j}-${Date.now()}` });
                        genAtoms.push({ x: mx + avgS.x, y: my + avgS.y, type: 'S2', id: `s-${i}-${j}-${Date.now()}` });
                    }
                }
                setGhostDomain({ atoms: genAtoms, boundary: currentPolygon.points, transform: { x: o.x, y: o.y, scale: 1.0, rot: 0.0 }, name: `晶粒 ${domains.length + 1}` });
                setViewMode('transform_ghost');
            };

            const finalizeTransform = (target) => {
                pushHistory();
                const data = target === 'ghost' ? ghostDomain : editingDomain;
                const { x, y, scale, rot } = data.transform, rad = (rot * Math.PI) / 180, source = target === 'ghost' ? data.atoms : data.originalAtoms;
                const finalized = source.map(a => {
                    const rx = a.x * Math.cos(rad) - a.y * Math.sin(rad), ry = a.x * Math.sin(rad) + a.y * Math.cos(rad);
                    return { ...a, x: rx * scale + x, y: ry * scale + y };
                }).filter(a => isPointInPolygon(a.x, a.y, data.boundary) && !gbMasks.some(m => isPointInPolygon(a.x, a.y, m.points)));

                if (target === 'ghost') { setDomains([...domains, { id: Date.now(), name: data.name, atoms: finalized, boundary: data.boundary }]); setGhostDomain(null); setCurrentPolygon(null); setCurrentSeeds([]); }
                else { setDomains(prev => prev.map(d => d.id === editingDomain.id ? { ...d, atoms: finalized } : d)); setEditingDomain(null); }
                setViewMode('edit');
            };

            const adjustTransform = (target, key, deltaOrValue, isAbsolute = false) => {
                const setter = target === 'ghost' ? setGhostDomain : setEditingDomain;
                setter(prev => {
                    if (!prev) return null;
                    const newVal = isAbsolute ? deltaOrValue : prev.transform[key] + deltaOrValue;
                    return { ...prev, transform: { ...prev.transform, [key]: newVal } };
                });
            };

            const handleMouseDown = (e) => {
                const { x, y } = getRealCoords(e);
                if (viewMode.startsWith('transform')) { setIsDragging(true); setDragStart({ x, y }); }
                else if (viewMode === 'delete_area') { setIsDragging(true); setSelectionStart({ x, y }); setSelectionEnd({ x, y }); }
            };

            const handleMouseMove = (e) => {
                const { x, y } = getRealCoords(e);
                if (isDragging) {
                    if (viewMode.startsWith('transform')) {
                        const target = viewMode === 'transform_ghost' ? 'ghost' : 'domain';
                        adjustTransform(target, 'x', x - dragStart.x); adjustTransform(target, 'y', y - dragStart.y);
                        setDragStart({ x, y });
                    } else if (viewMode === 'delete_area') setSelectionEnd({ x, y });
                }
            };

            const handleMouseUp = () => {
                if (isDragging && viewMode === 'delete_area' && selectionStart && selectionEnd) {
                    pushHistory();
                    const x1 = Math.min(selectionStart.x, selectionEnd.x), y1 = Math.min(selectionStart.y, selectionEnd.y);
                    const x2 = Math.max(selectionStart.x, selectionEnd.x), y2 = Math.max(selectionStart.y, selectionEnd.y);
                    const inBox = (p) => (p.x >= x1 && p.x <= x2 && p.y >= y1 && p.y <= y2);
                    setManualAtoms(prev => prev.filter(a => !inBox(a))); setCurrentSeeds(prev => prev.filter(s => !inBox(s))); setDomains(prev => prev.map(d => ({ ...d, atoms: d.atoms.filter(a => !inBox(a)) })));
                    setSelectionStart(null); setSelectionEnd(null);
                }
                setIsDragging(false);
            };

            const handleCanvasClick = (e) => {
                if (viewMode.startsWith('transform') || viewMode === 'delete_area' || isDragging) return;
                const { x, y } = getRealCoords(e);
                if (viewMode === 'gb_mask' || viewMode === 'domain_boundary') {
                    if (!currentPolygon) setCurrentPolygon({ points: [{ x, y }] });
                    else {
                        if (Math.sqrt((x - currentPolygon.points[0].x)**2 + (y - currentPolygon.points[0].y)**2) < 15 / zoomLevel && currentPolygon.points.length >= 3) {
                            pushHistory();
                            if (viewMode === 'gb_mask') { setGbMasks([...gbMasks, { id: Date.now(), points: currentPolygon.points }]); setCurrentPolygon(null); }
                            else setViewMode('seed');
                        } else setCurrentPolygon({ ...currentPolygon, points: [...currentPolygon.points, { x, y }] });
                    }
                } else if (viewMode === 'seed') {
                    if (currentSeeds.length < 6) setCurrentSeeds([...currentSeeds, { x, y, type: currentSeeds.length < 3 ? 'Mo' : 'S2', id: Date.now() }]);
                } else if (viewMode === 'edit') { pushHistory(); setManualAtoms([...manualAtoms, { x, y, type: selectedType, id: Date.now() }]); }
                else if (viewMode === 'delete') {
                    pushHistory(); const dSq = (p) => (p.x-x)**2 + (p.y-y)**2;
                    setManualAtoms(prev => prev.filter(a => dSq(a) > 100)); setCurrentSeeds(prev => prev.filter(s => dSq(s) > 100)); setDomains(prev => prev.map(d => ({ ...d, atoms: d.atoms.filter(a => dSq(a) > 64) })));
                }
            };

            // --- 渲染引擎 ---
            React.useEffect(() => {
                if (!image || !canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, image.width, image.height); ctx.drawImage(image, 0, 0);
                gbMasks.forEach(mask => { ctx.beginPath(); ctx.moveTo(mask.points[0].x, mask.points[0].y); mask.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath(); ctx.fillStyle = ATOM_COLORS.GBMask; ctx.fill(); });
                domains.forEach(d => {
                    if (editingDomain && editingDomain.id === d.id) return;
                    d.atoms.forEach(a => { ctx.beginPath(); ctx.arc(a.x, a.y, 4, 0, Math.PI * 2); ctx.fillStyle = ATOM_COLORS[a.type] + 'aa'; ctx.fill(); });
                    ctx.beginPath(); ctx.moveTo(d.boundary[0].x, d.boundary[0].y); d.boundary.forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath(); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.stroke();
                });
                const drawPreview = (data) => {
                    const { x, y, scale, rot } = data.transform, rad = (rot * Math.PI) / 180, source = data.atoms || data.originalAtoms;
                    ctx.save(); ctx.translate(x, y); ctx.rotate(rad);
                    source.forEach(a => {
                        const rx = (a.x * Math.cos(rad) - a.y * Math.sin(rad)) * scale + x, ry = (a.x * Math.sin(rad) + a.y * Math.cos(rad)) * scale + y;
                        ctx.beginPath(); ctx.arc(a.x * scale, a.y * scale, 4, 0, Math.PI * 2); 
                        ctx.fillStyle = isPointInPolygon(rx, ry, data.boundary) ? ATOM_COLORS[a.type] : 'rgba(255,255,255,0.05)'; ctx.fill();
                    });
                    ctx.restore();
                };
                if (ghostDomain) drawPreview(ghostDomain); if (editingDomain) drawPreview(editingDomain);
                manualAtoms.forEach(a => { ctx.beginPath(); ctx.arc(a.x, a.y, 6, 0, Math.PI * 2); ctx.fillStyle = ATOM_COLORS[a.type]; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke(); });
                if (currentPolygon) {
                    ctx.beginPath(); ctx.moveTo(currentPolygon.points[0].x, currentPolygon.points[0].y); currentPolygon.points.forEach(p => ctx.lineTo(p.x, p.y));
                    if (viewMode === 'seed' || viewMode.includes('transform')) { ctx.closePath(); ctx.strokeStyle = '#3b82f6'; ctx.setLineDash([]); } else { ctx.strokeStyle = '#fff'; ctx.setLineDash([5, 5]); }
                    ctx.stroke(); ctx.setLineDash([]);
                }
                currentSeeds.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, Math.PI * 2); ctx.fillStyle = ATOM_COLORS[s.type]; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); });
                if (isDragging && selectionStart && selectionEnd) {
                    ctx.strokeStyle = '#ef4444'; ctx.setLineDash([2, 2]); ctx.strokeRect(selectionStart.x, selectionStart.y, selectionEnd.x - selectionStart.x, selectionEnd.y - selectionStart.y);
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.1)'; ctx.fillRect(selectionStart.x, selectionStart.y, selectionEnd.x - selectionStart.x, selectionEnd.y - selectionStart.y); ctx.setLineDash([]);
                }
            }, [image, manualAtoms, gbMasks, domains, ghostDomain, editingDomain, currentPolygon, currentSeeds, selectionStart, selectionEnd, isDragging, zoomLevel, viewMode]);

            const exportFinalCIF = () => {
                const all = [...manualAtoms, ...domains.flatMap(d => d.atoms)];
                if (all.length === 0) return;
                const boxX = Math.max(...all.map(a => a.x * SCALE_DEFAULT)) + 10, boxY = Math.max(...all.map(a => a.y * SCALE_DEFAULT)) + 10;
                let cif = `data_MoS2_V32\n_cell_length_a ${boxX.toFixed(4)}\n_cell_length_b ${boxY.toFixed(4)}\n_cell_length_c 20.0\n_cell_angle_alpha 90\n_cell_angle_beta 90\n_cell_angle_gamma 90\n_symmetry_space_group_name_H-M 'P 1'\nloop_\n_atom_site_label\n_atom_site_type_symbol\n_atom_site_fract_x\n_atom_site_fract_y\n_atom_site_fract_z\n`;
                all.forEach((a, i) => {
                    const fx = (a.x * SCALE_DEFAULT) / boxX, fy = (a.y * SCALE_DEFAULT) / boxY;
                    if (a.type === 'Mo') cif += `Mo${i} Mo ${fx.toFixed(6)} ${fy.toFixed(6)} 0.500000\n`;
                    else if (a.type === 'S2') { cif += `S${i}a S ${fx.toFixed(6)} ${fy.toFixed(6)} 0.578\nS${i}b S ${fx.toFixed(6)} ${fy.toFixed(6)} 0.422\n`; }
                    else cif += `S${i} S ${fx.toFixed(6)} ${fy.toFixed(6)} 0.578\n`;
                });
                const b = new Blob([cif], { type: 'text/plain' }); const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = 'perfect_reconstructed.cif'; l.click();
            };

            const currentTransformTarget = viewMode === 'transform_ghost' ? ghostDomain : editingDomain;

            return (
                <div className="flex flex-col h-screen bg-[#020617] text-slate-100 font-sans select-none overflow-hidden">
                    <div className="flex items-center justify-between px-6 py-3 bg-[#0f172a] border-b border-slate-800 shadow-2xl z-30">
                        <div className="flex items-center gap-6">
                            <h1 className="text-xl font-black tracking-tighter flex items-center gap-2 text-blue-400 italic"><Icon name="layers" size={22} className="text-blue-500" /> MoS2 PRECISION V32</h1>
                            <div className="flex gap-2">
                                <button onClick={undo} className="p-2 bg-slate-800/50 hover:bg-slate-700 rounded transition border border-slate-700" title="撤回"><Icon name="undo-2" /></button>
                                <button onClick={restoreProgress} className="p-2 bg-blue-900/30 hover:bg-blue-800 rounded transition border border-blue-800 text-blue-300 flex items-center gap-2 px-3 text-xs font-bold"><Icon name="history" size={16}/> 恢复上次进度</button>
                                <button onClick={() => {if(confirm('重置？')) {localStorage.clear(); window.location.reload();}}} className="p-2 hover:bg-red-900/40 rounded text-red-400" title="清空"><Icon name="rotate-ccw" /></button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <label className="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg cursor-pointer text-xs font-bold border border-slate-700 transition flex items-center gap-2">
                                <Icon name="image" size={14}/> 1. 载入 STEM<input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                            </label>
                            <label className="bg-indigo-900/40 hover:bg-indigo-800 px-4 py-2 rounded-lg cursor-pointer text-xs font-bold border border-indigo-700 transition flex items-center gap-2 text-indigo-300">
                                <Icon name="file-digit" size={14}/> 2. 载入 CIF<input type="file" className="hidden" accept=".cif" onChange={handleCifImport} />
                            </label>
                            <div className="h-8 w-px bg-slate-800 mx-1" />
                            <button onClick={exportFinalCIF} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 shadow-lg transition"><Icon name="save" size={14}/> 导出 CIF</button>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden relative">
                        {message && <div className="absolute top-4 left-1/2 -translate-x-1/2 z-50 bg-blue-600 text-white px-6 py-2 rounded-full shadow-2xl font-bold text-sm animate-bounce">{message}</div>}

                        <div className="w-80 bg-[#0f172a] border-r border-slate-800 flex flex-col p-5 gap-6 overflow-y-auto sidebar-scroll">
                            <section>
                                <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 text-center border-b border-slate-800 pb-2">1. 区域外推 (补全模式)</h2>
                                <div className="space-y-2">
                                    <button onClick={() => setViewMode('gb_mask')} className={`w-full flex items-center gap-3 p-3 rounded-xl border-2 transition text-xs font-bold ${viewMode === 'gb_mask' ? 'tool-active' : 'border-slate-800 bg-slate-900/40'}`}>
                                        <Icon name="pen-tool" size={16} /> 划定晶界禁区
                                    </button>
                                    <button onClick={() => setViewMode('domain_boundary')} className={`w-full flex items-center gap-3 p-3 rounded-xl border-2 transition text-xs font-bold ${viewMode === 'domain_boundary' ? 'tool-active' : 'border-slate-800 bg-slate-900/40'}`}>
                                        <Icon name="grid-3x3" size={16} /> 划定晶粒本征区
                                    </button>
                                </div>
                            </section>

                            {currentTransformTarget && (
                                <section className="bg-blue-900/20 p-4 rounded-2xl border border-blue-500/40 animate-in fade-in">
                                    <h2 className="text-xs font-black text-blue-400 uppercase mb-4 flex items-center gap-2"><Icon name="sliders" size={14}/> 局部取向精修</h2>
                                    <div className="space-y-6">
                                        <div>
                                            <div className="flex justify-between text-[9px] mb-2 text-slate-400 uppercase tracking-tighter font-bold"><span>旋转角度</span><span>{currentTransformTarget.transform.rot.toFixed(1)}°</span></div>
                                            <input type="range" min="-180" max="180" step="0.5" value={currentTransformTarget.transform.rot} onChange={(e) => adjustTransform(viewMode.includes('ghost')?'ghost':'domain', 'rot', parseFloat(e.target.value), true)} />
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-[9px] mb-2 text-slate-400 uppercase tracking-tighter font-bold"><span>缩放倍率</span><span>x{currentTransformTarget.transform.scale.toFixed(3)}</span></div>
                                            <input type="range" min="0.5" max="1.5" step="0.005" value={currentTransformTarget.transform.scale} onChange={(e) => adjustTransform(viewMode.includes('ghost')?'ghost':'domain', 'scale', parseFloat(e.target.value), true)} />
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <button onClick={() => finalizeTransform(viewMode.includes('ghost')?'ghost':'domain')} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-black text-xs transition flex items-center justify-center gap-2"><Icon name="check-circle-2" size={16}/> 确认并合并</button>
                                            <button onClick={() => setViewMode('edit')} className="w-full py-2 bg-red-900/20 text-red-400 rounded-xl text-[10px] font-bold text-center italic">放弃本次操作</button>
                                        </div>
                                    </div>
                                </section>
                            )}

                            <section>
                                <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 text-center border-b border-slate-800 pb-2">2. 局部修补 (手动模式)</h2>
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <button onClick={() => setViewMode('edit')} className={`p-3 rounded-xl border-2 transition ${viewMode === 'edit' ? 'tool-active' : 'border-slate-800'}`}><Icon name="plus" size={18} /><span className="text-[9px] block mt-1 font-bold">手动补点</span></button>
                                    <button onClick={() => setViewMode('delete')} className={`p-3 rounded-xl border-2 transition ${viewMode === 'delete' ? 'tool-active' : 'border-slate-800'}`}><Icon name="mouse-pointer-2" size={18} /><span className="text-[9px] block mt-1 font-bold">点消除</span></button>
                                    <button onClick={() => setViewMode('delete_area')} className={`p-3 col-span-2 rounded-xl border-2 transition ${viewMode === 'delete_area' ? 'tool-active' : 'border-slate-800'}`}><Icon name="square" size={18} className="mx-auto" /><span className="text-[9px] block mt-1 font-black text-center uppercase tracking-tighter leading-tight">区域批量清除</span></button>
                                </div>
                                <div className="flex gap-1 bg-black/40 p-1.5 rounded-lg border border-slate-800">
                                    {['Mo', 'S2', 'S1'].map(t => ( <button key={t} onClick={() => setSelectedType(t)} className={`flex-1 py-1 rounded text-[10px] font-bold transition ${selectedType === t ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>{t}</button> ))}
                                </div>
                            </section>

                            <section className="pb-10">
                                <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 text-center border-b border-slate-800 pb-2">3. 晶粒分域管理</h2>
                                <div className="space-y-2 max-h-48 overflow-y-auto pr-1 sidebar-scroll">
                                    {domains.map(d => (
                                        <div key={d.id} className="flex items-center justify-between p-2 rounded bg-slate-900/50 border border-slate-800 hover:border-blue-500/50 transition"><span className="text-[10px] font-bold text-slate-400 truncate w-32">{d.name}</span><div className="flex gap-1"><button onClick={() => enterDomainEdit(d)} className="p-1 text-slate-500 hover:text-blue-400" title="调整位姿"><Icon name="sliders" size={14}/></button><button onClick={() => {pushHistory(); setDomains(prev => prev.filter(x => x.id !== d.id));}} className="p-1 text-slate-500 hover:text-red-400"><Icon name="trash-2" size={14}/></button></div></div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        <div className="main-viewport" onWheel={handleWheel}>
                            {currentTransformTarget && (
                                <div className="interaction-hint glass-card px-4 py-2 rounded-full border-blue-500/50 flex items-center gap-3 bg-blue-900/40 backdrop-blur-md">
                                    <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse" />
                                    <span className="text-[10px] font-black uppercase text-blue-400 tracking-widest leading-none">画布左键按住拖拽位姿 / 侧栏拖动条调节旋转与缩放</span>
                                </div>
                            )}

                            <div className="absolute top-6 left-6 z-20 space-y-3 pointer-events-none sticky">
                                {viewMode === 'seed' && (
                                    <div className="bg-yellow-500 text-slate-900 px-4 py-2 rounded-xl text-[11px] font-black shadow-2xl flex items-center gap-4 pointer-events-auto">
                                        <div className="flex items-center gap-2"><Icon name="grid-3x3" size={14} /> 标注种子: <span className="underline">{currentSeeds.length}/6</span></div>
                                        <button onClick={performExtrapolation} disabled={currentSeeds.length < 6} className="bg-black text-white px-3 py-1 rounded-lg text-[10px] hover:bg-slate-800 transition shadow font-bold uppercase tracking-tighter">执行结构外推</button>
                                        {currentSeeds.length > 0 && <button onClick={() => setCurrentSeeds(prev => prev.slice(0,-1))} className="bg-slate-900 text-white p-1 rounded hover:bg-black transition"><Icon name="corner-up-left" size={12}/></button>}
                                    </div>
                                )}
                            </div>
                            
                            <div className="canvas-wrapper">
                                {image ? (
                                    <div className="relative shadow-[0_0_150px_rgba(0,0,0,1)] border border-slate-800 bg-slate-950 rounded-sm overflow-hidden">
                                        <canvas 
                                            ref={canvasRef} 
                                            width={image.width} height={image.height} 
                                            onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onClick={handleCanvasClick} 
                                            style={{ 
                                                width: (image.width * zoomLevel) + 'px', 
                                                height: (image.height * zoomLevel) + 'px',
                                                cursor: currentTransformTarget ? 'move' : 'crosshair'
                                            }}
                                        />
                                    </div>
                                ) : (
                                    <div className="h-screen w-full flex flex-col items-center justify-center text-slate-700 opacity-20 font-black">
                                        <Icon name="refresh-cw" size={80} className="animate-spin" />
                                        <p className="text-xl font-light tracking-[0.5em] italic uppercase mt-4">Waiting for STEM Source</p>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        <div className="zoom-overlay flex items-center gap-4">
                             <div className="bg-slate-900/90 border border-slate-700 px-4 py-2 rounded-full text-[10px] font-mono text-blue-400 shadow-xl flex items-center gap-3 pointer-events-auto backdrop-filter backdrop-blur-sm">
                                 <span>{(zoomLevel * 100).toFixed(0)}%</span>
                                 <button onClick={() => setZoomLevel(1.0)} className="hover:text-white transition font-bold uppercase tracking-tighter leading-none">Reset Zoom</button>
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
